name: Compile LaTeX and Release PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        working-directory: EE322-Embedded-Systems/latex
        run: |
          latexmk -pdf -interaction=nonstopmode main.tex

      - name: Rename PDF
        run: |
          mv EE322-Embedded-Systems/latex/main.pdf EE322-Embedded-Systems/latex/EE322-Embedded-Systems-Notes.pdf

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload latest \
              EE322-Embedded-Systems/latex/EE322-Embedded-Systems-Notes.pdf \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create latest \
              EE322-Embedded-Systems/latex/EE322-Embedded-Systems-Notes.pdf \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest PDF Build" \
              --notes "Auto-compiled PDF from commit ${{ steps.sha.outputs.short }}."
          fi
